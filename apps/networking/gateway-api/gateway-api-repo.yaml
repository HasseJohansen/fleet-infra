# gateway-api-repo.yaml
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: gateway-api
  namespace: flux-system
spec:
  interval: 1h
  url: https://github.com/kubernetes-sigs/gateway-api
  ref:
    tag: v1.5.1  # Use the latest stable tag (check [releases](https://github.com/kubernetes-sigs/gateway-api/releases) for the latest)
