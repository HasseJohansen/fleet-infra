# ztunnel.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ztunnel
  namespace: istio-system
spec:
  interval: 10m
  chart:
    spec:
      chart: ztunnel
      version: "1.30.0"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  values:
    namespace: istio-system
    image: "docker.io/istio/ztunnel:1.30.0"  # <-- Full image name here
