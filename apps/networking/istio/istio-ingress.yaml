# istio-ingress.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: istio-ingress
---
# HelmRelease for Istio Ingress Gateway
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-ingress
  namespace: istio-ingress
spec:
  interval: 10m
  dependsOn:
    - name: istiod
      namespace: istio-system
  chart:
    spec:
      chart: gateway
      version: "1.30.2"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  values:
    # Service configuration for the gateway
    service:
      type: LoadBalancer
      # Annotations for cloud provider load balancers
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: nlb
        service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    # Resource configuration
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    # Auto-scaling
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 80
    # Pod disruption budget
    podDisruptionBudget:
      minAvailable: 1
