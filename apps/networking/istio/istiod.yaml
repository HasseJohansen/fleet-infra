# istiod.yaml
# HelmRelease for istiod - the Istio control plane
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
  namespace: istio-system
spec:
  interval: 10m
  # Wait for istio-base to be ready before installing
  dependsOn:
    - name: istio-base
      namespace: istio-system
  chart:
    spec:
      chart: istiod
      version: "1.30.0"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  values:
    istio_cni.enabled: true
    # Global mesh configuration
    global:
      # Set the mesh ID for multi-cluster setups
      meshID: my-mesh
      # Network name for multi-network setups
      network: network1
    # Pilot (istiod) configuration
    pilot:
      # Resource requests and limits
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      # Auto-scaling configuration
      autoscaleEnabled: true
      autoscaleMin: 2
      autoscaleMax: 5
      # Enable status updates for Istio resources
      env:
        PILOT_ENABLE_STATUS: "true"
        ENABLE_AMBIENT: "true"
    # Mesh-wide configuration
    meshConfig:
      enableAmbient: true
      # Enable access logging
      accessLogFile: /dev/stdout
      # Access log format
      accessLogEncoding: JSON
      # Default proxy configuration
      defaultConfig:
        # Enable distributed tracing
        tracing:
          sampling: 100.0
          zipkin:
            address: jaeger-collector.observability:9411
        # Hold application start until proxy is ready
        holdApplicationUntilProxyStarts: true
      # Enable automatic mTLS
      enableAutoMtls: true
      # Outbound traffic policy - allow or restrict
      outboundTrafficPolicy:
        mode: REGISTRY_ONLY
    # Ensure ztunnel is enabled
    ztunnel:
      enabled: true  # <-- Explicitly enable ztunnel
      hub: ""  # Use default Istio images
      tag: ""  # Use default Istio images
      image: ""  # Use default Istio images
      namespace: istio-system  # Explicitly set namespace
