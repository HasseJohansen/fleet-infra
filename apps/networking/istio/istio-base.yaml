# istio-base.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
---
# HelmRelease for Istio base CRDs - must be installed first
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-base
  namespace: istio-system
spec:
  interval: 10m
  chart:
    spec:
      chart: base
      version: "1.30.0"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  # Install CRDs with the chart
  install:
    crds: Create
  # Update CRDs when upgrading
  upgrade:
    crds: CreateReplace
