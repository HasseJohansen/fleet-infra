# istiod.yaml
# HelmRelease for istiod - the Istio control plane
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-cni
  namespace: kube-system
spec:
  interval: 10m
  chart:
    spec:
      chart: istio-cni
      version: "1.30.0"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  values:
    cni.ambient.enabled: true
