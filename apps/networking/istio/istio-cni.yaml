# istiod.yaml
# HelmRelease for istiod - the Istio control plane
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-cni
  namespace: istio-system
spec:
  interval: 10m
  chart:
    spec:
      chart: cni
      version: "1.30.1"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  values:
    ambient:
      enabled: true
      redirectMode: ebpf
    repair:
      enabled: true
      deletePods: true
    cni:
      chained: true
      excludeNamespaces:
        - istio-system
        - kube-system
    cniConfDir: /var/lib/rancher/k3s/agent/etc/cni/net.d
    cniBinDir: /var/lib/rancher/k3s/data/cni
