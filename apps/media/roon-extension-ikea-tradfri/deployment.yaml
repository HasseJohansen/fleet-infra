apiVersion: apps/v1
kind: Deployment
metadata:
    namespace: default
    labels:
        app: roon-extension-ikea-tradfri
    name: roon-extension-ikea-tradfri
spec:
    replicas: 1
    selector:
        matchLabels:
            app: roon-extension-ikea-tradfri
    strategy:
        type: Recreate # avoid two pods fighting over the same RWO volume
    template:
        metadata:
            labels:
                app: roon-extension-ikea-tradfri
        spec:
            hostNetwork: true
            containers:
                - image: hassejohansen/roon-extension-ikea-tradfri:latest
                  name: roon-extension-ikea-tradfri
                  command:
                    - sh
                    - -c
                  args:
                    - |
                      ln -sf /home/node/config/config.json /home/node/config.json
                      node .
                  resources: {}
                  volumeMounts:
                    - name: config-volume
                      mountPath: /home/node/config
            volumes:
                - name: config-volume
                  persistentVolumeClaim:
                    claimName: ikea-tradfri-config
            nodeSelector:
                kubernetes.io/hostname: minis-7373
status: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: ikea-tradfri-config
    namespace: default
spec:
    accessModes:
        - ReadWriteOnce
    storageClassName: longhorn
    resources:
        requests:
            storage: 100Mi
