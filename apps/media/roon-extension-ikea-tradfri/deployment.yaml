apiVersion: apps/v1
kind: Deployment
metadata:
    namespace: default
    labels:
        app: roon-extension-ikea-tradfri
    name: roon-extension-ikea-tradfri
spec:
    replicas: 1
    selector:
        matchLabels:
            app: roon-extension-ikea-tradfri
    strategy:
        type: Recreate # avoid two pods fighting over the same RWO volume
    template:
        metadata:
            labels:
                app: roon-extension-ikea-tradfri
        spec:
            hostNetwork: true
            initContainers:
                  - name: fix-perms
                    image: busybox:1.36
                    command:
                      - sh
                      - -c
                      - mkdir -p /app/config && chown -R 1001:1001 /app/config
                    securityContext:
                      runAsUser: 0          # need root to chown the root-owned mount
                    volumeMounts:
                      - name: config-volume
                        mountPath: /app/config
            containers:
                - image: hassejohansen/roon-extension-ikea-tradfri:0.2.2
                  name: roon-extension-ikea-tradfri
                  command:
                    - sh
                    - -c
                  args:
                    - |
                      ln -sf /app/config/config.json /app/config.json
                      node .
                  resources: {}
                  volumeMounts:
                    - name: config-volume
                      mountPath: /app/config
            volumes:
                - name: config-volume
                  persistentVolumeClaim:
                    claimName: ikea-tradfri-config
            nodeSelector:
                kubernetes.io/hostname: minis-7373
status: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: ikea-tradfri-config
    namespace: default
spec:
    accessModes:
        - ReadWriteOnce
    storageClassName: longhorn
    resources:
        requests:
            storage: 100Mi
