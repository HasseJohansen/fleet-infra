apiVersion: apps/v1
kind: Deployment
metadata:
    namespace: default
    labels:
        app: roon-extension-spotify-playlist
    name: roon-extension-spotify-playlist
spec:
    replicas: 1
    selector:
        matchLabels:
            app: roon-extension-spotify-playlist
    strategy: {}
    template:
        metadata:
            labels:
                app: roon-extension-spotify-playlist
        spec:
            hostNetwork: true
            containers:
                - image: hassejohansen/roon-extension-spotify-playlist:latest
                  name: roon-extension-spotify-playlist
                  command:
                    - sh
                    - -c
                  args:
                    - |
                      ln -sf  /home/node/config/config.json /home/node/config.json
                      node .
                  resources: {}
                  volumeMounts:
                    - name: config-volume
                      mountPath: /home/node/config
            volumes:
                - name: config-volume
                  persistentVolumeClaim:
                    claimName: roon-extension-spotify-playlist-config
            nodeSelector:
                kubernetes.io/hostname: minis-7373
status: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: roon-extension-spotify-playlist-config
    namespace: default
spec:
    accessModes:
        - ReadWriteOnce
    storageClassName: longhorn
    resources:
        requests:
            storage: 100Mi

