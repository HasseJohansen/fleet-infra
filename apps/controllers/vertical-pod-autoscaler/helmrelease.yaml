apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vertical-pod-autoscaler
  namespace: vpa
spec:
  interval: 15m
  chart:
    spec:
      chart: ./vertical-pod-autoscaler/charts/vertical-pod-autoscaler
      sourceRef:
        kind: GitRepository
        name: vertical-pod-autoscaler
        namespace: flux-system
  values:
    installCRDs: true
